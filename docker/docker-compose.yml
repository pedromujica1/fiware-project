version: "3.7"

services:

  mongodb:
    extends:
      file: docker-compose-dev.yml
      service: mongodb
    volumes:
      - mongo_data_lora:/data/db
  
  orion:
    extends:
      file: docker-compose-dev.yml
      service: orion
    command: -dbhost mongodb -port 1026 -logLevel INFO

  iotagent-lora:
    depends_on:
      - orion
      - mongodb
    entrypoint: bin/iotagent-lora docker/config-docker.js
    hostname: iotagent-lora
    image: ioeari/iotagent-lora
    ports:
      - "4041:4041"
    networks:
      - LoRaWAN
  draco:
    image: quay.io/fiware/draco
    container_name: draco
    depends_on:
        - mongodb
    environment:
        - NIFI_WEB_HTTP_PORT=9090
    ports:
        - '9090:9090'
        - '5050:5050'
    healthcheck:
        test: curl --fail -s http://localhost:9090/nifi-api/system-diagnostics || exit 1
    networks:
      - LoRaWAN
    
volumes:
  mongo_data_lora: 
  lora_device_data: 

networks:
  LoRaWAN: {}
