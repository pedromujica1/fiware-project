
services:
  mongodb:
    extends:
      file: docker-compose-dev.yml
      service: mongodb
    volumes:
      - mongo_data_lora:/data/db
  
  orion:
    extends:
      file: docker-compose-dev.yml
      service: orion
    command: -dbURI mongodb://mongodb:27017 -logLevel INFO -logForHumans -statCounters -statNotifQueue -notificationMode threadpool

  iotagent-lora:
    restart: unless-stopped
    depends_on:
      - orion
      - mongodb
    entrypoint: bin/iotagent-lora docker/config-docker.js
    hostname: iotagent-lora
    image: ioeari/iotagent-lora
    ports:
      - "4041:4041"
    networks:
      - LoRaWAN
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096

  postgres-db:
    image: postgres:18
    hostname: postgres-db
    container_name: db-postgres
    expose:
      - "5432"
    ports:
      - "5432:5432"
    networks:
      - LoRaWAN
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
      
  
  cygnus:
    image: fiware/cygnus-ngsi:latest
    hostname: cygnus
    container_name: fiware-cygnus
    networks:
        - LoRaWAN
    depends_on:
        - postgres-db
    expose:
        - "5080"
    ports:
        - "5055:5055"
        - "5080:5080"
    environment:
        - "CYGNUS_POSTGRESQL_HOST=postgres-db"
        - "CYGNUS_POSTGRESQL_PORT=5432"
        - "CYGNUS_POSTGRESQL_USER=postgres"
        - "CYGNUS_POSTGRESQL_PASS=password"
        - "CYGNUS_POSTGRESQL_ENABLE_CACHE=true"
        - "CYGNUS_POSTGRESQL_SERVICE_PORT=5055"
        - "CYGNUS_LOG_LEVEL=INFO"
        - "CYGNUS_API_PORT=5080"
        - "CYGNUS_SERVICE_PORT=5055"
    volumes:
    - ./cygnus/agent.conf:/tmp/agent.conf:ro
    command: >
      /bin/sh -c "cp /tmp/agent.conf /opt/apache-flume/conf/agent.conf
      && exec /cygnus-entrypoint.sh"
 
  grafana:
    image: grafana/grafana
    depends_on:
        - postgres-db
    ports:
        - '3003:3000'
    environment:
        - GF_INSTALL_PLUGINS=orchestracities-map-panel,grafana-clock-panel,grafana-worldmap-panel
    networks:
      - LoRaWAN
    volumes:
      - grafana_data:/var/lib/grafana
  #API de predição
  ml-api:
    image: pedromujica1/fiware-ml-api:4.0
    container_name: ml-api
    depends_on:
      - orion
    ports:
      - "8000:8000"
  
    networks:
      - LoRaWAN
    restart: always
    environment:
      - ORION_BASE_URL=http://orion:1026
      - API_SERVICE_NAME=ml-api

  #servidor mosquito
  mosquitto:
    image: eclipse-mosquitto:latest
    hostname: mqtt
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9002:9001"
    volumes:
      - ./config:/mosquitto/config
      - ./data:/mosquitto/data
      - ./log:/mosquitto/log
    #permite interagir com o broker pela linha de comando
    stdin_open: true
    tty: true
    networks:
      - LoRaWAN

  #cadvisor para metricas
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - '8080:8080'
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - LoRaWAN

  #prometheus pra guardar os dados
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
    - 9090:9090
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    volumes:
    - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
    - cadvisor
    networks:
      - LoRaWAN
    
volumes:
  mongo_data_lora: 
  lora_device_data:
  postgres_data:
  grafana_data: 


networks:
  LoRaWAN: {}