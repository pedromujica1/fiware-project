version: "3"

services:
  mongo:
    image: mongo:4.4
    container_name: mongo-db
    ports:
      - "27017:27017"
    command: --nojournal
    volumes:
      - mongo_data:/data/db

  orion:
    image: fiware/orion
    links:
      - mongo
    ports:
      - "1026:1026"
    command: -dbhost mongo
  
  iot-agent:
    image: fiware/iotagent-ul:latest
    hostname: iot-agent
    container_name: fiware-iot-agent
    depends_on:
      - mongo
      - orion
    ports:
      - "4041:4041"
    expose:
      - "4041"
    environment:
      - "IOTA_CB_HOST=orion"
      - "IOTA_CB_PORT=1026"
      - "IOTA_NORTH_PORT=4041"
      - "IOTA_REGISTRY_TYPE=mongodb"
      - "IOTA_LOG_LEVEL=DEBUG"
      - "IOTA_TIMESTAMP=true"
      - "IOTA_MONGO_HOST=mongo"
      - "IOTA_MONGO_PORT=27017"
      - "IOTA_MONGO_DB=iotagentul"
      - "IOTA_PROVIDER_URL=http://iot-agent:4041"
      - "IOTA_MQTT_HOST=au1.cloud.thethings.network"   # Your MQTT broker
      - "IOTA_MQTT_PORT=1883"                         # Default MQTT port
      - "IOTA_MQTT_USERNAME=envcity-aqm@ttn"            # MQTT username
      - "IOTA_MQTT_PASSWORD=NNSXS.MEBFVHICSHLPKAUOXL2I5RLMZILIFM6PWTSIHOY.UD7ICI2IIMKG7F6KYKJPQQWUTE4ZPB6XFU5KHWM3PZQEDSP4JVLA"            # MQTT password
      - "IOTA_MQTT_TOPIC=ultralight/devices"          # Topic to subscribe
      - "IOTA_MQTT_QoS=0"                             # MQTT QoS
    networks:
      - default


volumes:
  mongo_data:
    driver: local

networks:
  default:
    driver: bridge
